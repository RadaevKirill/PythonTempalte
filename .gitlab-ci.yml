stages:
  - check

default:
  image: python:3.12-slim-bookworm
  before_script:
    - python -m pip install --upgrade pip
    - pip install -e ".[dev]"

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - when: never

lint:
  stage: check
  script:
    - python -m ruff check .

test:
  stage: check
  script:
    - python -m pytest
