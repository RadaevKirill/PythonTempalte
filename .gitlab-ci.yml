stages:
  - check

default:
  image: python:3.13-slim-bookworm
  before_script:
    - python -m pip install --upgrade pip
    - pip install uv
    - uv sync --extra dev

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - when: never

lint:
  stage: check
  script:
    - uv run ruff check .

test:
  stage: check
  script:
    - uv run pytest
